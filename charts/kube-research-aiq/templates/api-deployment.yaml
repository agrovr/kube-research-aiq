apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-research-aiq.fullname" . }}-api
  labels:
    {{- include "kube-research-aiq.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      {{- include "kube-research-aiq.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "kube-research-aiq.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "kube-research-aiq.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "kube-research-aiq.fullname" . }}-config
            {{- if .Values.secrets.create }}
            - secretRef:
                name: {{ include "kube-research-aiq.fullname" . }}-secrets
            {{- end }}
          {{- if or .Values.secrets.nvidiaExistingSecretName .Values.secrets.databaseExistingSecretName .Values.secrets.redisExistingSecretName }}
          env:
            {{- if .Values.secrets.nvidiaExistingSecretName }}
            - name: KRAI_NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.nvidiaExistingSecretName | quote }}
                  key: {{ .Values.secrets.nvidiaExistingSecretKey | quote }}
            {{- end }}
            {{- if .Values.secrets.databaseExistingSecretName }}
            - name: KRAI_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.databaseExistingSecretName | quote }}
                  key: {{ .Values.secrets.databaseExistingSecretKey | quote }}
            {{- end }}
            {{- if .Values.secrets.redisExistingSecretName }}
            - name: KRAI_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redisExistingSecretName | quote }}
                  key: {{ .Values.secrets.redisExistingSecretKey | quote }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: workflow-config
              mountPath: /etc/krai
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: workflow-config
          configMap:
            name: {{ include "kube-research-aiq.fullname" . }}-config
            items:
              - key: workflow.yaml
                path: workflow.yaml
