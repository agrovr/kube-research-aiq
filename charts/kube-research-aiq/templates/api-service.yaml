apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-research-aiq.fullname" . }}-api
  labels:
    {{- include "kube-research-aiq.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    {{- include "kube-research-aiq.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
