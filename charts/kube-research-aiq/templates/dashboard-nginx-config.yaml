{{- if .Values.dashboard.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kube-research-aiq.fullname" . }}-dashboard-nginx
  labels:
    {{- include "kube-research-aiq.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      location /v1 {
        proxy_pass http://{{ include "kube-research-aiq.fullname" . }}-api;
      }

      location = /readyz {
        proxy_pass http://{{ include "kube-research-aiq.fullname" . }}-api/readyz;
      }

      location = /healthz {
        proxy_pass http://{{ include "kube-research-aiq.fullname" . }}-api/healthz;
      }

      location = /metrics {
        proxy_pass http://{{ include "kube-research-aiq.fullname" . }}-api/metrics;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
{{- end }}
