{{- if .Values.dashboard.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-research-aiq.fullname" . }}-dashboard
  labels:
    {{- include "kube-research-aiq.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: http
  selector:
    {{- include "kube-research-aiq.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
{{- end }}
