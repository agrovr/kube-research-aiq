{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kube-research-aiq.fullname" . }}-secrets
  labels:
    {{- include "kube-research-aiq.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.secrets.nvidiaExistingSecretName }}
  KRAI_NVIDIA_API_KEY: {{ .Values.secrets.nvidiaApiKey | quote }}
  {{- end }}
  TAVILY_API_KEY: {{ .Values.secrets.tavilyApiKey | quote }}
  SERPER_API_KEY: {{ .Values.secrets.serperApiKey | quote }}
  {{- if .Values.secrets.databaseUrl }}
  KRAI_DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- else if .Values.postgres.enabled }}
  KRAI_DATABASE_URL: {{ include "kube-research-aiq.postgresDsn" . | quote }}
  {{- end }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  {{- end }}
{{- end }}
