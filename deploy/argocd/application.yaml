apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-research-aiq
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/agrovr/kube-research-aiq.git
    targetRevision: main
    path: charts/kube-research-aiq
    helm:
      releaseName: kuberesearch
      values: |
        config:
          provider: mock
        ingress:
          enabled: true
          host: kuberesearch.example.com
  destination:
    server: https://kubernetes.default.svc
    namespace: aiq-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
